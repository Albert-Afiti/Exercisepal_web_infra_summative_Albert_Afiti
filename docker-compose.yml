version: '3.8'

networks:
  drugspal-net:
    driver: bridge

services:
  app1:
    build: .
    environment:
      - PORT=3000
      - FDA_API_KEY=${FDA_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
    restart: unless-stopped
    networks:
      - drugspal-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/drug/search?name=aspirin', r => process.exit(r.statusCode === 200 || r.statusCode === 404 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  app2:
    build: .
    environment:
      - PORT=3000
      - FDA_API_KEY=${FDA_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
    restart: unless-stopped
    networks:
      - drugspal-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/drug/search?name=aspirin', r => process.exit(r.statusCode === 200 || r.statusCode === 404 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drugspal-net
