# ─── Nginx Load Balancer Configuration for Lb01 ──────────────────────────────
# Deploy this file on your Lb01 server at:
#   /etc/nginx/sites-available/drugspal
# Then symlink: sudo ln -s /etc/nginx/sites-available/drugspal /etc/nginx/sites-enabled/
#
# Replace WEB01_IP and WEB02_IP with the actual private IPs of your web servers.
# ──────────────────────────────────────────────────────────────────────────────

upstream drugspal_backend {
    # Round-robin load balancing (default)
    server WEB01_IP:3000;
    server WEB02_IP:3000;

    # Optional: enable keepalive connections to backends
    keepalive 16;
}

server {
    listen 80;
    server_name _;  # Accept requests on any hostname / IP

    # Proxy all requests to the backend pool
    location / {
        proxy_pass         http://drugspal_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Health-check endpoint — returns 200 from whichever backend handles it
    location /health {
        proxy_pass http://drugspal_backend;
    }
}
